<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background: #0f172a;
      color: #cbd5e1;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .header-title { font-weight: 700; font-size: 13px; color: #fff; flex: 1; }
    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .url-row { color: #64748b; font-size: 11px; word-break: break-all; }
    .url-val { color: #94a3b8; }
    .info-box {
      padding: 7px 9px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.8;
      min-height: 36px;
    }
    .info-row { display: flex; gap: 6px; }
    .key { color: #475569; min-width: 36px; }
    .val { color: #e2e8f0; word-break: break-all; }
    .val.dim { color: #64748b; }
    .dim { color: #475569; }
    .target {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      font-size: 11px;
    }
    .target label { color: #64748b; }
    .target input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 11px;
    }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #1d4ed8; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .btn.ok  { background: #16a34a; }
    .btn.err { background: #dc2626; }
    .status { font-size: 11px; color: #64748b; text-align: center; min-height: 16px; }
    .status.err { color: #f87171; }
    .status.ok  { color: #4ade80; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" width="20" height="20" style="border-radius:3px;flex-shrink:0" />
    <span class="header-title">Cookie Bridge</span>
  </div>

  <div class="body">
    <div class="url-row">From: <span class="url-val" id="from-url">—</span></div>

    <div class="info-box" id="info">
      <span class="dim">Reading search state…</span>
    </div>

    <div class="target">
      <label>To</label>
      <input id="web-url" value="https://log-explorer-parser.ytwok.xyz" />
    </div>

    <button class="btn" id="send-btn">Send to Log Explorer</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
