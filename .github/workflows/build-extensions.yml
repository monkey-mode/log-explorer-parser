name: Build Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── OSD Log Explorer → .zip (no build step needed) ───────────────────
      - name: Validate manifest
        run: |
          node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"
          echo "manifest.json is valid JSON"

      - name: Pack extension as zip
        run: |
          zip -r osd-log-explorer.zip extension -x "*.DS_Store" "extension/README.md"
          ls -lh osd-log-explorer.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: osd-log-explorer
          path: osd-log-explorer.zip

      # ── Create / update GitHub Release ───────────────────────────────────
      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create latest \
            --title "OSD Log Explorer — latest build" \
            --notes "$(cat <<'EOF'
          ## OSD Log Explorer (`osd-log-explorer.zip`)

          Chrome side-panel log viewer that reads logs live from the OpenSearch
          Dashboards search API (`opensearch-with-long-numerals`). Works on both
          `logging-nonprd` and `logging-prd`.

          **Install:**
          1. Download and unzip `osd-log-explorer.zip` to a permanent folder
          2. Open `chrome://extensions`
          3. Enable **Developer mode** (top-right toggle)
          4. Click **Load unpacked** → select the unzipped `extension` folder

          **Use:** Open an OSD Discover tab, click the extension icon to open the
          side panel, then run a search — results appear automatically.

          ---
          > Chrome blocks side-loading `.crx` files from outside the Web Store (since Chrome 73).
          > The zip + Load unpacked method is the only reliable way to install self-signed extensions.
          EOF
          )" \
            --prerelease \
            osd-log-explorer.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
