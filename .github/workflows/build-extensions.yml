name: Build Extensions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Cookie Bridge → .zip (load unpacked) ─────────────────────────────
      - name: Pack Cookie Bridge as zip
        run: |
          cd cookie-bridge
          zip -r ../cookie-bridge.zip . -x "*.DS_Store"
          cd ..
          ls -lh cookie-bridge.zip

      # ── Log Explorer Extension ────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: Build Log Explorer extension
        working-directory: extension
        run: npm run build

      - name: Pack Log Explorer as zip
        run: |
          cd extension/dist
          zip -r ../../log-explorer-extension.zip .
          cd ../..
          ls -lh log-explorer-extension.zip

      # ── Create / update GitHub Release ───────────────────────────────────
      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create latest \
            --title "Chrome Extensions — latest build" \
            --notes "$(cat <<'EOF'
          ## Chrome Extensions

          ### Cookie Bridge (`cookie-bridge.zip`)
          Reads cookies + search state from the OSD tab and sends them to the Log Explorer web app — no manual copy-paste.

          **Install:**
          1. Download and unzip `cookie-bridge.zip` to a permanent folder
          2. Open `chrome://extensions`
          3. Enable **Developer mode** (top-right toggle)
          4. Click **Load unpacked** → select the unzipped folder

          ### Log Explorer (`log-explorer-extension.zip`)
          Side-panel log explorer that reads directly from the OSD Discover tab.

          **Install:** Same steps with `log-explorer-extension.zip`.

          ---
          > Chrome blocks side-loading `.crx` files from outside the Web Store (since Chrome 73).
          > The zip + Load unpacked method is the only reliable way to install self-signed extensions.
          EOF
          )" \
            --prerelease \
            cookie-bridge.zip \
            log-explorer-extension.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
